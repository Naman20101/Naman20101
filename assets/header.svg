
<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Animated Gradient -->
    <radialGradient id="grad1" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#00D4FF;#7C3AED" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>

    <radialGradient id="grad2" cx="70%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#00D4FF">
        <animate attributeName="stop-color" values="#00D4FF;#7C3AED;#00D4FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0D1117"/>
  <circle cx="200" cy="80" r="200" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="700" cy="180" r="200" fill="url(#grad2)" opacity="0.6"/>

  <!-- Glass Card -->
  <rect x="100" y="40" width="700" height="180" rx="25"
        fill="rgba(255,255,255,0.05)"
        stroke="rgba(255,255,255,0.2)"/>

  <!-- Subtitle -->
  <text x="450" y="80" text-anchor="middle"
        fill="#9CA3AF" font-size="14" letter-spacing="3">
    FOUNDER · DUBAI
  </text>

  <!-- Name (glow effect) -->
  <text x="450" y="130" text-anchor="middle"
        fill="#FFFFFF" font-size="36" font-weight="bold">
    <tspan>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      Naman Reddy
    </tspan>
  </text>

  <!-- Clickable Pills -->
  <a href="https://github.com/Naman20101/Nexora.AI">
    <rect x="280" y="150" rx="12" width="100" height="30"
          fill="rgba(255,255,255,0.08)"/>
    <text x="330" y="170" text-anchor="middle" fill="#E5E7EB">Nexora.AI</text>
  </a>

  <a href="https://github.com/Naman20101/GovMind.AI">
    <rect x="400" y="150" rx="12" width="100" height="30"
          fill="rgba(255,255,255,0.08)"/>
    <text x="450" y="170" text-anchor="middle" fill="#E5E7EB">GovMind.AI</text>
  </a>

  <a href="https://github.com/Naman20101/SignSpeak.AI">
    <rect x="520" y="150" rx="12" width="110" height="30"
          fill="rgba(255,255,255,0.08)"/>
    <text x="575" y="170" text-anchor="middle" fill="#E5E7EB">SignSpeak.AI</text>
  </a>

</svg>
